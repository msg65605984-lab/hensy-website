<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>视频预览</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17212b;
        --muted: #5d6b78;
        --line: #dbe3ea;
        --surface: #ffffff;
        --page: #f5f7f4;
        --accent: #2f6f4e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
        color: var(--ink);
        background: var(--page);
      }

      main {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        text-decoration: none;
        font-weight: 700;
      }

      .brand img {
        width: 88px;
        height: auto;
      }

      .home-link {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      .player {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 18px 50px rgba(23, 33, 43, 0.08);
      }

      video {
        display: block;
        width: 100%;
        max-height: calc(100vh - 180px);
        background: #111;
      }

      .caption {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(22px, 4vw, 34px);
        line-height: 1.2;
      }

      p {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .download {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 20px, 1040px);
          padding: 18px 0;
        }

        .topbar,
        .caption {
          align-items: flex-start;
          flex-direction: column;
        }

        .download {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <a class="brand" href="index.html" aria-label="返回首页">
          <img src="tu/hensy-logo.svg" alt="HENSY">
          <span>视频预览</span>
        </a>
        <a class="home-link" href="index.html">返回首页</a>
      </header>

      <section class="player" aria-label="视频播放器">
        <video controls playsinline preload="metadata">
          <source src="media/wechat-video-2026-06-13-185304.mp4" type="video/mp4">
          当前浏览器不支持直接播放该视频。
        </video>
        <div class="caption">
          <div>
            <h1>微信视频 2026-06-13 18:53</h1>
            <p>可在线播放，也可以下载原始 MP4 文件。</p>
          </div>
          <a class="download" href="media/wechat-video-2026-06-13-185304.mp4" download>下载视频</a>
        </div>
      </section>
    </main>
  </body>
</html>
