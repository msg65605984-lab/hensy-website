<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HENSY 官网后台管理系统</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="admin.css">
  </head>
  <body>
    <section class="admin-login-screen" data-login-screen>
      <div class="login-panel">
        <a class="admin-brand login-brand" href="admin.html" aria-label="HENSY 后台首页">
          <img src="tu/hensy-logo.svg" alt="HENSY">
        </a>
        <h1>官网后台登录</h1>
        <p>请输入管理密码进入 Banner、产品、博客和站点内容管理。</p>
        <form class="login-card" data-login-form>
          <label>
            管理密码
            <div class="password-field">
              <input type="password" data-password autocomplete="current-password" placeholder="默认 admin123">
              <button class="password-toggle" type="button" data-toggle-password aria-label="显示密码" aria-pressed="false">
                <svg class="password-eye password-eye-open" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5c5.5 0 9.7 3.4 11.5 7-1.8 3.6-6 7-11.5 7S2.3 15.6.5 12C2.3 8.4 6.5 5 12 5zm0 2C7.8 7 4.3 9.2 2.6 12 4.3 14.8 7.8 17 12 17s7.7-2.2 9.4-5c-1.7-2.8-5.2-5-9.4-5zm0 1.5A3.5 3.5 0 1 1 12 15a3.5 3.5 0 0 1 0-7zm0 2A1.5 1.5 0 1 0 12 13a1.5 1.5 0 0 0 0-3z" />
                </svg>
                <svg class="password-eye password-eye-close" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3.3 5.9 4.7 4.5 19.5 19.3l-1.4 1.4-2.2-2.2c-1.1.3-2.5.5-3.9.5-5.5 0-9.7-3.4-11.5-7a13.4 13.4 0 0 1 4.2-4.8L3.3 5.9zm2.8 2.8C4.9 9.8 4 10.9 2.6 12 4.3 14.8 7.8 17 12 17c1.1 0 2.2-.1 3.2-.4l-1.7-1.7a3.5 3.5 0 0 1-4.7-4.7L6.1 8.7zM12 7c5.5 0 9.7 3.4 11.5 7-.7 1.4-1.8 2.9-3.2 4.2l-1.5-1.5c1-.9 1.8-1.9 2.4-2.7-1.7-2.8-5.2-5-9.4-5-.5 0-1 .1-1.5.1L8.2 7.1c1.2-.1 2.4-.1 3.8-.1z" />
                </svg>
              </button>
            </div>
          </label>
          <button type="submit">登录后台</button>
          <p data-login-status>未登录</p>
        </form>
      </div>
    </section>

    <header class="admin-topbar">
      <a class="admin-brand" href="admin.html" aria-label="HENSY 后台首页">
        <img src="tu/hensy-logo.svg" alt="HENSY">
      </a>
      <p>官网后台管理系统</p>
      <div class="topbar-actions">
        <button class="text-button" type="button" data-reload>重新读取</button>
        <button type="button" data-save>保存 JSON</button>
      </div>
    </header>

    <aside class="admin-sidebar">
      <nav class="admin-menu" aria-label="后台模块">
        <button type="button" data-view="banners">BANNER</button>
        <button type="button" data-view="products">产品管理</button>
        <button type="button" data-view="blogs">博客管理</button>
        <button type="button" data-view="about">站点设置</button>
        <div class="submenu" data-submenu>
          <button type="button" data-view="about">关于我们</button>
          <button type="button" data-view="comments">客户评论</button>
          <button type="button" data-view="faqs">问题管理</button>
        </div>
      </nav>

      <div class="login-box">
        <label>
          已登录
          <input type="text" data-login-state readonly value="未登录">
        </label>
        <button type="button" data-logout>退出登录</button>
        <p data-login-status>未登录时只能查看，保存和上传需要登录。</p>
      </div>
    </aside>

    <main class="admin-shell">
      <section class="page-head">
        <h1 data-page-title>轮播图管理</h1>
        <p data-page-subtitle>官网管理</p>
      </section>

      <div class="admin-alert" hidden data-alert></div>
      <section class="admin-board" data-view-root aria-live="polite"></section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
