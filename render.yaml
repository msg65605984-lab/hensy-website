services:
  - type: web
    name: hensy-website
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: hensy-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data/data
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: ADMIN_PASSWORD
        sync: false
